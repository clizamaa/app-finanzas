---
# Configuración de deploy automático para cPanel
# Este archivo automatiza el proceso de despliegue

deployment:
  tasks:
    # Instalar dependencias de producción
    - export DEPLOYPATH=/home/usuario/public_html
    - /bin/cp -R * $DEPLOYPATH
    - cd $DEPLOYPATH
    
    # Instalar dependencias
    - npm install --production
    
    # Generar Prisma Client
    - npx prisma generate
    
    # Construir la aplicación
    - npm run build
    
    # Configurar permisos
    - chmod 755 server.js
    - chmod 644 package.json
    - chmod 644 next.config.js
    
    # Limpiar archivos innecesarios
    - rm -rf .git
    - rm -rf node_modules/.cache
    - rm -rf .next/cache
    
    # Crear directorio de logs si no existe
    - mkdir -p logs
    - chmod 755 logs

# Archivos a excluir del deploy
exclude:
  - .git/
  - .gitignore
  - .env
  - .env.local
  - node_modules/
  - .next/
  - "*.log"
  - .vscode/
  - .idea/
  - README.md
  - cpanel-deploy.md